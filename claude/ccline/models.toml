# CCometixLine Model Configuration
# This file defines model display names and context limits for different LLM models
# File location: ~/.claude/ccline/models.toml
#
# Claude models are automatically recognized (Sonnet, Opus, Haiku) with
# version extraction. You only need to add entries here for overrides or
# third-party models.

# Model configurations (simple substring matching)
# Each [[models]] section defines a model pattern and its properties
# These take priority over built-in Claude model recognition

# Example:
# [[models]]
# pattern = "my-model"
# display_name = "My Model"
# context_limit = 128000

# Context modifiers override context limits and append suffix to display names
# They are matched independently, enabling composition:
#   model "Opus 4" + modifier " 1M" = "Opus 4 1M"

# Example:
# [[context_modifiers]]
# pattern = "[1m]"
# display_suffix = " 1M"
# context_limit = 1000000

# Current Claude models ship with a 1M token context window by default
# (Haiku 4.5 is the only current exception, at 200k -- which matches ccline's
# built-in fallback, so it needs no override). ccline's built-in family table
# predates these releases and otherwise assumes the legacy 200k default,
# understating the real budget in the statusline percentage. "fable" and
# "mythos" aren't recognized families at all in the built-in table, so those
# two also need an explicit display_name.
[[models]]
pattern = "sonnet-5"
display_name = "Sonnet 5"
context_limit = 1000000

[[models]]
pattern = "sonnet-4-6"
display_name = "Sonnet 4.6"
context_limit = 1000000

[[models]]
pattern = "opus-4-8"
display_name = "Opus 4.8"
context_limit = 1000000

[[models]]
pattern = "opus-4-7"
display_name = "Opus 4.7"
context_limit = 1000000

[[models]]
pattern = "opus-4-6"
display_name = "Opus 4.6"
context_limit = 1000000

[[models]]
pattern = "fable-5"
display_name = "Fable 5"
context_limit = 1000000

[[models]]
pattern = "mythos-5"
display_name = "Mythos 5"
context_limit = 1000000
